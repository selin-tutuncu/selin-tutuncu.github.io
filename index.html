<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Uygulamasi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <nav class="navbar">
      <div class="logo">FlexLab</div>
      <div class="nav-links">
        <a href="#">Ana Sayfa</a>
        <a href="#">Hizmetler</a>
        <a href="#">Projeler</a>
        <a href="#">Iletisim</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-text">
        <h1>Flexbox ile Guclu Yerlesim</h1>
        <p>
          Bu bolumde iki kolonlu yapi, hizalama ve esneyebilen alanlar birlikte kullanilmistir.
        </p>
        <button>Daha Fazla Incele</button>
      </div>
      <div class="hero-visual">
        <span>Gorsel Kutusu</span>
      </div>
    </section>

    <section class="cards-section">
      <article class="card">Kart 1</article>
      <article class="card">Kart 2</article>

      <article class="card">Kart 4</article>
      <article class="card">Kart 5</article>
      <article class="card">Kart 6</article>
    </section>

    <section class="growth-section">
      <div class="grow-box box-one">Flex 1</div>
      <div class="grow-box box-two">Flex 2</div>
      <div class="grow-box box-three">Flex 1</div>
    </section>

    <footer class="footer">
      <p>Flexbox laboratuvar uygulamasi</p>
    </footer>
  </div>

</html>
