<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Uygulama Ödevi</title>
    <style>
        /* SIFIRLAMA VE ANA YAPI */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Tam ekran yüksekliği */
            width: 100%;
        }

        /* 1) NAVBAR - 10vh */
        .navbar {
            height: 10vh;
            background-color: #f1c40f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border: 2px solid black;
        }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: black; background: white; padding: 5px 15px; border: 2px solid black; font-size: 14px; }

        /* 2) HERO - 30vh */
        .hero {
            height: 30vh;
            display: flex;
            flex-direction: row;
        }
        .hero-left { 
            flex: 1; 
            background-color: #e67e22; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            border: 2px solid black;
            font-size: 2rem;
        }
        .hero-right { 
            flex: 1; 
            background-color: #95a5a6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            border: 2px solid black;
            font-size: 2rem;
        }

        /* 3) KARTLAR - 30vh */
        .cards-container {
            height: 30vh;
            display: flex;
            flex-wrap: wrap;
        }
        .card { 
            flex: 1 1 33.33%; 
            background-color: #3498db; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid black;
            font-size: 1.5rem;
        }

        /* 4) GROW - 20vh */
        .grow-section {
            height: 20vh;
            display: flex;
        }
        .box { display: flex; align-items: center; justify-content: center; color: white; border: 2px solid black; font-size: 1.5rem; }
        .box1 { flex-grow: 1; background-color: #1abc9c; }
        .box2 { flex-grow: 2; background-color: #2ecc71; }
        .box3 { flex-grow: 1; background-color: #1abc9c; }

        /* 5) FOOTER - 10vh */
        .footer {
            height: 10vh;
            background-color: #34495e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header class="navbar">
            <div>NAVBAR (10vh)</div>
            <ul class="nav-links">
                <li><a href="index.html">GERİ DÖN</a></li>
                <li>Link 1</li>
                <li>Link 2</li>
            </ul>
        </header>

        <section class="hero">
            <div class="hero-left">HERO LEFT</div>
            <div class="hero-right">HERO RIGHT</div>
        </section>

        <section class="cards-container">
            <div class="card">KART 1</div>
            <div class="card">KART 2</div>
            <div class="card">KART 3</div>
            <div class="card">KART 4</div>
            <div class="card">KART 5</div>
            <div class="card">KART 6</div>
        </section>

        <section class="grow-section">
            <div class="box box1">GROW: 1</div>
            <div class="box box2">GROW: 2</div>
            <div class="box box3">GROW: 1</div>
        </section>

        <footer class="footer">
            FOOTER (10vh)
        </footer>
    </div>

</body>
</html>
