<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Uygulama Ödevi</title>
    <style>
        /* Sadece temel yapı ve renkler */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Tam ekran yüksekliği */
        }

        /* Ortak Yazı Tipi ve Hizalama */
        .section {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* 1) NAVBAR - Sarı */
        .navbar {
            height: 10vh;
            background-color: #f1c40f;
            justify-content: space-around; /* Logo ve linkler için */
        }
        .navbar a { background: white; padding: 5px 10px; text-decoration: none; color: black; border-radius: 5px; font-size: 1rem; }

        /* 2) HERO - Turuncu ve Gri */
        .hero {
            height: 30vh;
            display: flex;
        }
        .hero-left { flex: 1; background-color: #e67e22; color: white; }
        .hero-right { flex: 1; background-color: #95a5a6; color: white; }

        /* 3) KARTLAR - Mavi */
        .cards {
            height: 30vh;
            display: flex;
            flex-wrap: wrap;
        }
        .card { flex: 1 1 33.33%; background-color: #3498db; color: white; border: 1px solid white; }

        /* 4) GROW - Yeşil Tonları */
        .grow-area {
            height: 20vh;
            display: flex;
        }
        .g1 { flex-grow: 1; background-color: #1abc9c; color: white; }
        .g2 { flex-grow: 2; background-color: #2ecc71; color: white; border-left: 2px solid white; border-right: 2px solid white; }
        .g3 { flex-grow: 1; background-color: #1abc9c; color: white; }

        /* 5) FOOTER - Koyu Gri */
        .footer {
            height: 10vh;
            background-color: #34495e;
            color: white;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header class="section navbar">
            <div>NAVBAR</div>
            <a href="index.html">GERİ DÖN</a>
        </header>

        <section class="hero">
            <div class="section hero-left">HERO LEFT</div>
            <div class="section hero-right">HERO RIGHT</div>
        </section>

        <section class="cards">
            <div class="section card">KART 1</div>
            <div class="section card">KART 2</div>
            <div class="section card">KART 3</div>
            <div class="section card">KART 4</div>
            <div class="section card">KART 5</div>
            <div class="section card">KART 6</div>
        </section>

        <section class="grow-area">
            <div class="section g1">GROW: 1</div>
            <div class="section g2">GROW: 2</div>
            <div class="section g3">GROW: 1</div>
        </section>

        <footer class="section footer">
            FOOTER (10vh)
        </footer>
    </div>

</body>
</html>
