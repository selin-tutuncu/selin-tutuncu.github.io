<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Uygulama</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 10vh;
            padding: 0 20px;
            background: #f1c40f;
        }

        .menu {
            display: flex;
            gap: 10px;
        }

        .menu a {
            text-decoration: none;
            background: white;
            padding: 6px 12px;
            border-radius: 5px;
            color: black;
        }

        .hero {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: stretch;
            height: 30vh;
        }

        .hero-left {
            flex: 1;
            background: #e67e22;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        .hero-right {
            flex: 1;
            background: #95a5a6;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            height: 30vh;
            padding: 10px;
        }

        .card {
            flex: 1 1 30%;
            background: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grow {
            display: flex;
            height: 20vh;
        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box1 {
            flex-grow: 1;
            background: #1abc9c;
        }

        .box2 {
            flex-grow: 2;
            background: #2ecc71;
        }

        .box3 {
            flex-grow: 1;
            background: #1abc9c;
        }

        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 10vh;
            background: #34495e;
            color: white;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <div class="navbar">
        <div>LOGO</div>

        <div class="menu">
            <a href="#">Ana Sayfa</a>
            <a href="#">Hakkında</a>
            <a href="#">Dersler</a>
            <a href="#">İletişim</a>
            <a href="index.html">Geri Dön</a>
        </div>
    </div>

    <div class="hero">
        <div class="hero-left">
            <h2>Hero Alanı</h2>
            <p>Flexbox ile hizalama örneği</p>
        </div>
        <div class="hero-right"></div>
    </div>

    <div class="cards">
        <div class="card">Kart 1</div>
        <div class="card">Kart 2</div>
        <div class="card">Kart 3</div>
        <div class="card">Kart 4</div>
        <div class="card">Kart 5</div>
        <div class="card">Kart 6</div>
    </div>

    <div class="grow">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
    </div>

    <div class="footer">
        Footer
    </div>

</div>

</body>
</html>
